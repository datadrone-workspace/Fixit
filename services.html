<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services — FixIt</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── SERVICES PAGE SPECIFIC ── */
    .services-page { padding: 40px 80px 80px; }

    /* Category Tabs */
    .cat-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .cat-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-border);
      background: var(--white);
      cursor: pointer;
      transition: all 0.22s;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-dark);
    }

    .cat-tab:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .cat-tab.active {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
      box-shadow: var(--shadow-orange);
    }

    .cat-tab-icon { font-size: 1.2rem; }
    .cat-tab-count {
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .cat-tab:not(.active) .cat-tab-count {
      background: var(--gray-light);
      color: var(--gray-mid);
    }

    /* Page Header */
    .services-header {
      padding: 48px 0 36px;
    }

    .services-header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    /* Category Hero */
    .cat-hero {
      background: var(--orange-pale);
      border-radius: var(--radius-xl);
      padding: 36px 40px;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border: 1.5px solid rgba(255,107,53,0.15);
      animation: fadeUp 0.4s forwards;
    }

    .cat-hero-left { display: flex; align-items: center; gap: 20px; }

    .cat-hero-icon {
      width: 72px; height: 72px;
      background: var(--white);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      box-shadow: var(--shadow-sm);
    }

    .cat-hero-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .cat-hero-desc { font-size: 0.88rem; color: var(--gray-mid); }

    .cat-hero-stats {
      display: flex;
      gap: 32px;
    }

    .cat-stat-num {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--navy);
    }

    .cat-stat-label { font-size: 0.75rem; color: var(--gray-mid); }

    /* Sub-service Cards */
    .sub-services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .sub-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-border);
      padding: 24px;
      cursor: pointer;
      transition: all 0.22s;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.4s forwards;
    }

    .sub-card:hover {
      border-color: var(--orange);
      box-shadow: var(--shadow-orange);
      transform: translateY(-2px);
    }

    .sub-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sub-card-icon {
      width: 48px; height: 48px;
      background: var(--orange-pale);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      transition: background 0.22s;
    }

    .sub-card:hover .sub-card-icon { background: var(--orange); }

    .sub-card-price {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--orange);
    }

    .sub-card-price span {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray-mid);
    }

    .sub-card-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .sub-card-meta {
      font-size: 0.8rem;
      color: var(--gray-mid);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sub-card-meta span { display: flex; align-items: center; gap: 4px; }

    .sub-card-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--gray-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sub-card-tag { font-size: 0.75rem; color: var(--gray-mid); }

    /* Service Detail Panel (slide-in) */
    .detail-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.45);
      backdrop-filter: blur(4px);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .detail-panel-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .detail-panel {
      position: fixed;
      top: 0; right: 0;
      width: 480px;
      height: 100vh;
      background: var(--white);
      z-index: 151;
      box-shadow: -8px 0 40px rgba(26,26,46,0.12);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-panel-overlay.open .detail-panel {
      transform: translateX(0);
    }

    .detail-panel-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--gray-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
    }

    .detail-panel-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--gray-light);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      color: var(--gray-dark);
      transition: all 0.2s;
    }

    .detail-panel-close:hover { background: var(--orange-pale); color: var(--orange); }

    .detail-panel-body { padding: 28px; flex: 1; }

    .detail-service-hero {
      background: var(--orange-pale);
      border-radius: var(--radius-lg);
      padding: 28px;
      text-align: center;
      margin-bottom: 24px;
    }

    .detail-service-emoji { font-size: 3rem; margin-bottom: 10px; }

    .detail-service-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .detail-service-cat {
      font-size: 0.8rem;
      color: var(--gray-mid);
    }

    .detail-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .detail-info-box {
      background: var(--gray-light);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .detail-info-label { font-size: 0.72rem; color: var(--gray-mid); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-info-value { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--navy); }

    .detail-includes {
      margin-bottom: 24px;
    }

    .detail-includes h4 {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 14px;
    }

    .detail-includes ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-includes ul li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--gray-dark);
    }

    .detail-includes ul li::before {
      content: '✓';
      width: 20px; height: 20px;
      background: #DCFCE7;
      color: #16A34A;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .detail-panel-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--gray-border);
      background: var(--white);
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .detail-price-block .label { font-size: 0.75rem; color: var(--gray-mid); }
    .detail-price-block .price {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--navy);
    }

    @media (max-width: 768px) {
      .services-page { padding: 24px 20px 60px; }
      .sub-services-grid { grid-template-columns: 1fr; }
      .cat-hero { flex-direction: column; align-items: flex-start; }
      .detail-panel { width: 100%; }
      .services-header-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <script>
    !function(){var i="analytics",analytics=window[i]=window[i]||[];if(!analytics.initialize)if(analytics.invoked)window.console&&console.error&&console.error("Segment snippet included twice.");else{analytics.invoked=!0;analytics.methods=["trackSubmit","trackClick","trackLink","trackForm","pageview","identify","reset","group","track","ready","alias","debug","page","screen","once","off","on","addSourceMiddleware","addIntegrationMiddleware","setAnonymousId","addDestinationMiddleware","register"];analytics.factory=function(e){return function(){if(window[i].initialized)return window[i][e].apply(window[i],arguments);var n=Array.prototype.slice.call(arguments);if(["track","screen","alias","group","page","identify"].indexOf(e)>-1){var c=document.querySelector("link[rel='canonical']");n.push({__t:"bpc",c:c&&c.getAttribute("href")||void 0,p:location.pathname,u:location.href,s:location.search,t:document.title,r:document.referrer})}n.unshift(e);analytics.push(n);return analytics}};for(var n=0;n<analytics.methods.length;n++){var key=analytics.methods[n];analytics[key]=analytics.factory(key)}analytics.load=function(key,n){var t=document.createElement("script");t.type="text/javascript";t.async=!0;t.setAttribute("data-global-segment-analytics-key",i);t.src="https://cdn.segment.com/analytics.js/v1/"+key+"/analytics.min.js";var r=document.getElementsByTagName("script")[0];r.parentNode.insertBefore(t,r);analytics._loadOptions=n};analytics._writeKey="YOUR_WRITE_KEY";analytics._cdn="https://cdn.segment.com";analytics.SNIPPET_VERSION="5.2.1";

</head>
<body>

  <div id="navbarRoot"></div>
  <div id="authModalRoot"></div>

  <!-- SERVICE DETAIL PANEL -->
  <div class="detail-panel-overlay" id="detailPanel">
    <div class="detail-panel" id="detailPanelInner"></div>
  </div>

  <main class="page-content">
    <div class="services-page">

      <!-- Header -->
      <div class="services-header">
        <div class="services-header-inner">
          <div>
            <div class="section-label">All Services</div>
            <h1 class="section-title" style="margin-bottom:0">What can we fix today?</h1>
          </div>
        </div>
      </div>

      <!-- Category Tabs -->
      <div class="cat-tabs" id="catTabs"></div>

      <!-- Category Hero + Sub-services -->
      <div id="categoryView"></div>

    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.getElementById('navbarRoot').innerHTML = renderNavbar('Services');
    document.getElementById('authModalRoot').innerHTML = renderAuthModal();

    // Fire Services Page Viewed
    Segment.page('Services Page');

    // ── State ──
    let activeCategory = 'plumbing';
    let activePanelService = null;

    // Read ?cat= from URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('cat') && SERVICES[urlParams.get('cat')]) {
      activeCategory = urlParams.get('cat');
    }

    // ── Render Category Tabs ──
    function renderTabs() {
      const tabs = document.getElementById('catTabs');
      tabs.innerHTML = Object.values(SERVICES).map(svc => `
        <button class="cat-tab ${activeCategory === svc.id ? 'active' : ''}"
          onclick="switchCategory('${svc.id}')">
          <span class="cat-tab-icon">${svc.icon}</span>
          ${svc.name}
          <span class="cat-tab-count">${svc.items.length}</span>
        </button>
      `).join('');
    }

    // ── Render Category View ──
    function renderCategoryView() {
      const svc = SERVICES[activeCategory];
      const view = document.getElementById('categoryView');

      view.innerHTML = `
        <!-- Category Hero -->
        <div class="cat-hero">
          <div class="cat-hero-left">
            <div class="cat-hero-icon">${svc.icon}</div>
            <div>
              <div class="cat-hero-name">${svc.name} Services</div>
              <div class="cat-hero-desc">${svc.desc}</div>
            </div>
          </div>
          <div class="cat-hero-stats">
            <div>
              <div class="cat-stat-num">★ ${svc.rating}</div>
              <div class="cat-stat-label">Avg Rating</div>
            </div>
            <div>
              <div class="cat-stat-num">${svc.reviewCount.toLocaleString()}</div>
              <div class="cat-stat-label">Reviews</div>
            </div>
            <div>
              <div class="cat-stat-num">${svc.items.length}</div>
              <div class="cat-stat-label">Services</div>
            </div>
          </div>
        </div>

        <!-- Sub-service Cards -->
        <div class="sub-services-grid">
          ${svc.items.map((item, i) => `
            <div class="sub-card" style="animation-delay:${i * 0.07}s"
              onclick="openServiceDetail('${svc.id}', '${item.id}')">
              <div class="sub-card-top">
                <div class="sub-card-icon">${item.icon}</div>
                <div class="sub-card-price">₹${item.price}<span> onwards</span></div>
              </div>
              <div class="sub-card-name">${item.name}</div>
              <div class="sub-card-meta">
                <span>⏱ ${item.duration}</span>
                <span>★ ${svc.rating}</span>
              </div>
              <div class="sub-card-footer">
                <span class="sub-card-tag tag tag-green">✓ Verified Pro</span>
                <span class="btn btn-primary btn-sm">Book Now</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ── Switch Category ──
    function switchCategory(catId) {
      activeCategory = catId;
      const svc = SERVICES[catId];

      // Fire specific Segment event
      Segment.track(`${svc.name} Service Viewed`, {
        category: catId,
        source: 'services_page',
        totalServicesAvailable: svc.items.length,
      });

      renderTabs();
      renderCategoryView();
    }

    // ── Open Service Detail Panel ──
    function openServiceDetail(catId, itemId) {
      const svc = SERVICES[catId];
      const item = svc.items.find(i => i.id === itemId);
      activePanelService = { svc, item };

      // Segment: specific service viewed
      Segment.track(`${svc.name} Service Viewed`, {
        category: catId,
        serviceName: item.name,
        serviceId: item.id,
        price: item.price,
        duration: item.duration,
        source: 'service_detail_panel',
      });

      const includes = {
        plumbing: ['Leak detection & diagnosis', 'Parts included (standard)', '30-day service warranty', 'Licensed & insured professional'],
        electrical: ['Safety inspection included', 'Standard parts provided', '30-day workmanship warranty', 'Certified electrician'],
        cleaning: ['All cleaning supplies included', 'Eco-friendly products used', 'Trained & verified cleaners', '100% satisfaction guarantee'],
        carpentry: ['Basic hardware included', 'Tools & equipment provided', '30-day repair warranty', 'Skilled carpenter'],
      };

      document.getElementById('detailPanelInner').innerHTML = `
        <div class="detail-panel-header">
          <div>
            <div style="font-size:0.75rem;color:var(--gray-mid);margin-bottom:2px">${svc.name}</div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--navy)">${item.name}</div>
          </div>
          <button class="detail-panel-close" onclick="closeDetailPanel()">✕</button>
        </div>

        <div class="detail-panel-body">
          <div class="detail-service-hero">
            <div class="detail-service-emoji">${item.icon}</div>
            <div class="detail-service-name">${item.name}</div>
            <div class="detail-service-cat">${svc.name} · Professional Service</div>
          </div>

          <div class="detail-info-grid">
            <div class="detail-info-box">
              <div class="detail-info-label">Price</div>
              <div class="detail-info-value">₹${item.price}</div>
            </div>
            <div class="detail-info-box">
              <div class="detail-info-label">Duration</div>
              <div class="detail-info-value">${item.duration}</div>
            </div>
            <div class="detail-info-box">
              <div class="detail-info-label">Rating</div>
              <div class="detail-info-value">★ ${svc.rating}</div>
            </div>
            <div class="detail-info-box">
              <div class="detail-info-label">Reviews</div>
              <div class="detail-info-value">${svc.reviewCount.toLocaleString()}</div>
            </div>
          </div>

          <div class="detail-includes">
            <h4>What's included</h4>
            <ul>
              ${(includes[catId] || []).map(inc => `<li>${inc}</li>`).join('')}
            </ul>
          </div>

          <div style="background:var(--orange-pale);border-radius:var(--radius-md);padding:14px 16px;font-size:0.82rem;color:var(--gray-dark);line-height:1.6;">
            💡 <strong>How it works:</strong> After booking, a verified professional will contact you to confirm the slot. Payment is collected after the service is completed.
          </div>
        </div>

        <div class="detail-panel-footer">
          <div class="detail-price-block">
            <div class="label">Starting from</div>
            <div class="price">₹${item.price}</div>
          </div>
          <button class="btn btn-primary btn-lg" onclick="goToBooking('${catId}', '${item.id}')">
            Book Now →
          </button>
        </div>
      `;

      document.getElementById('detailPanel').classList.add('open');
    }

    function closeDetailPanel() {
      document.getElementById('detailPanel').classList.remove('open');
      activePanelService = null;
    }

    // Close panel on overlay click
    document.getElementById('detailPanel').addEventListener('click', function(e) {
      if (e.target === this) closeDetailPanel();
    });

    // ── Go to Booking ──
    function goToBooking(catId, itemId) {
      const user = Auth.current();
      if (!user) {
        closeDetailPanel();
        openAuthModal('register');
        return;
      }
      const svc = SERVICES[catId];
      const item = svc.items.find(i => i.id === itemId);

      // Segment: Booking Started
      Segment.track(`${svc.name} Booking Started`, {
        category: catId,
        serviceName: item.name,
        serviceId: item.id,
        price: item.price,
        source: 'service_detail_panel',
      });

      // Store pending booking in session
      sessionStorage.setItem('fixit_pending_booking', JSON.stringify({ catId, itemId }));
      window.location.href = `booking.html?cat=${catId}&item=${itemId}`;
    }

    // ── Init ──
    renderTabs();
    renderCategoryView();

    // Fire initial category viewed event
    const initSvc = SERVICES[activeCategory];
    Segment.track(`${initSvc.name} Service Viewed`, {
      category: activeCategory,
      source: urlParams.get('cat') ? 'direct_link' : 'services_page',
      totalServicesAvailable: initSvc.items.length,
    });
  </script>

</body>
</html>
